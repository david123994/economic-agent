name: Economic News Agent (Free)
on:
  schedule:
    # 06:00 UTC מקביל ל-09:00 בבוקר בשעון קיץ בישראל (UTC+3)
    # (בחורף ניתן לשנות ל- '0 7 * * *')
    - cron: '0 6 * * *'
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור במידת הצורך
        inputs:
      action:
        description: "בחר פעולה"
        required: true
        default: "collect"
        type: choice
        options:
          - collect
          - report
          - both
jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: התקנת חבילות
        run: pip install requests beautifulsoup4 lxml
      - name: שחזור מסד הנתונים
        uses: actions/cache@v4
        with:
          path: news.db
          key: news-db-${{ github.run_id }}
          restore-keys: news-db-
      - name: איסוף חדשות יומי
        if: |
          github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (
            github.event.inputs.action == 'collect' ||
            github.event.inputs.action == 'both'
          ))
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/scraper.py
      - name: שליחת דוח שבועי
        if: |
          github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (
            github.event.inputs.action == 'report' ||
            github.event.inputs.action == 'both'
          ))
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python src/reporter.py
      - name: שמירת מסד הנתונים
        uses: actions/cache/save@v4
        if: always()
        with:
          path: news.db
          key: news-db-${{ github.run_id }}
